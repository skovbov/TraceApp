services:
  traceapp.api:
    build:
      context: .
      dockerfile: src/Api/TraceApp.Api/Dockerfile
    container_name: traceapp-api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__TraceAppDatabase: Host=postgres;Port=5432;Database=traceapp;Username=postgres;Password=postgres
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    container_name: traceapp-postgres
    environment:
      POSTGRES_DB: traceapp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: