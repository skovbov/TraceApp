name: Pull Request Validation

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --configuration Release --no-restore

      - name: Run application tests
        run: dotnet test tests/TraceApp.Application.Tests/TraceApp.Application.Tests.csproj --configuration Release --no-build

      - name: Run architecture tests
        run: dotnet test tests/TraceApp.Architecture.Tests/TraceApp.Architecture.Tests.csproj --configuration Release --no-build

      - name: Run integration tests
        run: dotnet test tests/TraceApp.IntegrationTests/TraceApp.IntegrationTests.csproj --configuration Release --no-build
