name: Pull Request Validation

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  CI: true

jobs:
  validate:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
          cache: true

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run application tests
        run: >
          dotnet test tests/TraceApp.Application.Tests/TraceApp.Application.Tests.csproj
          --no-build
          --configuration Release
          --logger "trx;LogFileName=application-tests.trx"

      - name: Run architecture tests
        run: >
          dotnet test tests/TraceApp.Architecture.Tests/TraceApp.Architecture.Tests.csproj
          --no-build
          --configuration Release
          --logger "trx;LogFileName=architecture-tests.trx"

      - name: Run integration tests
        run: >
          dotnet test tests/TraceApp.IntegrationTests/TraceApp.IntegrationTests.csproj
          --no-build
          --configuration Release
          --logger "trx;LogFileName=integration-tests.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/*.trx
